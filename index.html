<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alps & Vows — Private Location Journal</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --muted: #6b6b65;
      --faint: #a0a099;
      --surface: #ffffff;
      --raised: #f5f4f0;
      --border: rgba(0,0,0,0.08);
      --border-md: rgba(0,0,0,0.15);
      --accent: #4a7c59;
      --accent-light: #e8f0eb;
      --accent-dark: #2f5239;
      --gold: #c8a96e;
      --gold-light: #f5edd8;
      --danger: #c0392b;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #e8e6df;
        --muted: #9c9a92;
        --faint: #6b6b65;
        --surface: #1c1c1a;
        --raised: #252523;
        --border: rgba(255,255,255,0.08);
        --border-md: rgba(255,255,255,0.15);
        --accent: #5d9970;
        --accent-light: #1e3328;
        --accent-dark: #7ab88a;
        --gold: #d4a96e;
        --gold-light: #2e2415;
        --danger: #e05b4b;
      }
    }

    html, body { height: 100%; font-family: 'Jost', sans-serif; background: var(--raised); color: var(--ink); -webkit-font-smoothing: antialiased; }

    /* ── LOCK SCREEN ── */
    #lock-screen {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 20px; text-align: center; background: var(--surface); position: fixed; inset: 0; z-index: 9999; transition: opacity 0.6s ease;
    }
    .lock-logo { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 300; letter-spacing: 0.08em; color: var(--ink); margin-bottom: 6px; }
    .lock-tagline { font-size: 0.78rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 48px; }
    .lock-divider { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 40px; }
    .lock-label { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .lock-input-wrap { position: relative; width: 260px; }
    .lock-input { width: 100%; padding: 14px 48px 14px 18px; border: 1px solid var(--border-md); background: var(--raised); color: var(--ink); font-family: 'Jost', sans-serif; font-size: 1rem; letter-spacing: 0.1em; border-radius: 2px; outline: none; transition: border-color 0.2s; }
    .lock-input:focus { border-color: var(--accent); }
    .lock-submit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--accent); font-size: 1.1rem; padding: 4px; }
    .lock-error { margin-top: 12px; font-size: 0.78rem; color: var(--danger); letter-spacing: 0.05em; height: 18px; }
    .lock-footer { margin-top: 60px; font-size: 0.7rem; color: var(--faint); letter-spacing: 0.1em; }

    /* ── APP SHELL ── */
    #app { display: none; height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .app-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 400; letter-spacing: 0.06em; color: var(--ink); }
    .app-logo span { color: var(--gold); }
    .header-actions { display: flex; gap: 8px; }
    .btn-icon { background: none; border: 1px solid var(--border); border-radius: 2px; padding: 7px 12px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 0.1em; color: var(--muted); transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }

    /* ── MAIN LAYOUT ── */
    .app-body { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 340px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .map-area { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ── TABS ── */
    .tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab { flex: 1; padding: 13px 8px; font-size: 0.73rem; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── PANEL CONTENT ── */
    .panel { flex: 1; overflow-y: auto; padding: 20px; display: none; }
    .panel.active { display: block; }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

    /* ── FILTER PILLS ── */
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .filter-pill { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 0.72rem; letter-spacing: 0.08em; cursor: pointer; color: var(--muted); transition: all 0.15s; background: var(--surface); }
    .filter-pill:hover { border-color: var(--accent); color: var(--accent); }
    .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-pill.gold { border-color: var(--gold); color: var(--gold); }
    .filter-pill.gold.active { background: var(--gold); border-color: var(--gold); color: #fff; }

    /* ── LOCATION CARDS ── */
    .location-card {
      border: 1px solid var(--border); border-radius: 3px; margin-bottom: 12px;
      background: var(--surface); cursor: pointer; transition: all 0.15s; overflow: hidden;
    }
    .location-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(74,124,89,0.1); }
    .location-card.starred { border-color: var(--gold); }
    .card-header { padding: 14px 16px 10px; display: flex; justify-content: space-between; align-items: flex-start; }
    .card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; color: var(--ink); line-height: 1.3; }
    .card-star { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: var(--border-md); transition: color 0.15s; padding: 0; line-height: 1; }
    .card-star.on { color: var(--gold); }
    .card-meta { padding: 0 16px 14px; display: flex; gap: 12px; flex-wrap: wrap; }
    .meta-chip { font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .meta-chip .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
    .card-note { padding: 10px 16px; background: var(--raised); border-top: 1px solid var(--border); font-size: 0.82rem; color: var(--muted); line-height: 1.5; font-style: italic; }
    .card-note-input { width: 100%; background: transparent; border: none; outline: none; font-family: 'Jost', sans-serif; font-size: 0.82rem; color: var(--ink); line-height: 1.5; resize: none; min-height: 60px; }
    .card-note-input::placeholder { color: var(--faint); font-style: italic; }
    .card-trail-tag { display: inline-block; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; background: var(--accent-light); color: var(--accent); margin: 0 16px 12px; }

    /* ── TRAIL CARDS ── */
    .trail-card {
      border: 1px solid var(--border); border-radius: 3px; margin-bottom: 14px;
      padding: 18px; cursor: pointer; background: var(--surface); transition: all 0.15s;
    }
    .trail-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .trail-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 6px; color: var(--ink); }
    .trail-region { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .trail-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; margin-bottom: 12px; }
    .trail-stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .trail-stat { font-size: 0.72rem; color: var(--muted); }
    .trail-stat strong { color: var(--ink); font-weight: 500; }

    /* ── ADD FORM ── */
    .add-form { background: var(--raised); border: 1px solid var(--border); border-radius: 3px; padding: 18px; margin-bottom: 20px; }
    .form-title { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: var(--ink); margin-bottom: 14px; }
    .form-row { margin-bottom: 12px; }
    .form-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border-md); border-radius: 2px;
      background: var(--surface); color: var(--ink); font-family: 'Jost', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 70px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-sm { padding: 8px 16px; font-size: 0.75rem; letter-spacing: 0.08em; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.15s; background: var(--surface); color: var(--muted); }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-sm.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

    /* ── MAP POPUPS ── */
    .leaflet-popup-content-wrapper { border-radius: 3px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid var(--border); }
    .popup-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--ink); margin-bottom: 4px; }
    .popup-meta { font-size: 0.75rem; color: var(--muted); }

    /* ── MAP LEGEND ── */
    .map-legend {
      position: absolute; bottom: 28px; left: 12px; z-index: 1000;
      background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
      padding: 10px 14px; font-size: 0.72rem; color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ── DETAIL DRAWER ── */
    #detail-drawer {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 1001;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 20px 24px; transform: translateY(100%); transition: transform 0.3s ease;
      max-height: 50%; overflow-y: auto;
    }
    #detail-drawer.open { transform: translateY(0); }
    .drawer-close { position: absolute; top: 14px; right: 16px; background: none; border: none; cursor: pointer; font-size: 1.1rem; color: var(--muted); }
    .drawer-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--ink); margin-bottom: 4px; }
    .drawer-region { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .drawer-stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; }
    .drawer-stat { font-size: 0.78rem; color: var(--muted); }
    .drawer-stat strong { color: var(--ink); }
    .drawer-note { font-size: 0.85rem; color: var(--muted); line-height: 1.6; font-style: italic; background: var(--raised); padding: 12px; border-radius: 2px; }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--ink); }
    .section-count { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--faint); font-size: 0.85rem; line-height: 1.7; }
    .empty-icon { font-size: 2rem; margin-bottom: 10px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .sidebar { width: 100%; position: absolute; bottom: 0; left: 0; right: 0; z-index: 500; height: 50vh; border-right: none; border-top: 1px solid var(--border); }
      .map-area { height: 50vh; }
      .app-body { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-logo">Alps &amp; Vows</div>
  <div class="lock-tagline">Private Location Journal</div>
  <div class="lock-divider"></div>
  <div class="lock-label">Access Code</div>
  <div class="lock-input-wrap">
    <input type="password" class="lock-input" id="code-input" placeholder="· · · · · · · ·" autocomplete="off"/>
    <button class="lock-submit" onclick="attemptUnlock()">→</button>
  </div>
  <div class="lock-error" id="lock-error"></div>
  <div class="lock-footer">alps & vows · switzerland · private</div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div class="app-logo">Alps <span>&</span> Vows</div>
    <div class="header-actions">
      <button class="btn-icon btn-primary" onclick="showAddForm()">+ Add Location</button>
      <button class="btn-icon" onclick="lockApp()">🔒 Lock</button>
    </div>
  </header>
  <div class="app-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('map')">Map</div>
        <div class="tab" onclick="switchTab('locations')">Locations</div>
        <div class="tab" onclick="switchTab('trails')">Trails</div>
      </div>

      <!-- MAP PANEL -->
      <div class="panel active" id="map-panel">
        <div class="filter-bar" id="filter-bar"></div>
        <div id="location-list"></div>
      </div>

      <!-- LOCATIONS PANEL -->
      <div class="panel" id="locations-panel">
        <div id="add-form-container"></div>
        <div class="section-header">
          <div class="section-title">All Locations</div>
          <div class="section-count" id="loc-count"></div>
        </div>
        <div id="all-locations-list"></div>
      </div>

      <!-- TRAILS PANEL -->
      <div class="panel" id="trails-panel">
        <div id="trails-list"></div>
      </div>
    </div>

    <!-- MAP -->
    <div class="map-area">
      <div id="map"></div>
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#c8a96e"></div> Starred spot</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4a7c59"></div> Location</div>
      </div>
      <div id="detail-drawer">
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
        <div id="drawer-content"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ──────────────────────────────────────
// DATA
// ──────────────────────────────────────
const ACCESS_CODE = 'alps2024';

const TRAILS = [
  {
    id: 'bernese',
    name: 'Bernese Oberland',
    region: 'Bern Canton',
    desc: 'Dramatic waterfalls, alpine meadows, and the iconic Jungfrau massif. Prime territory for golden-hour ceremonies with jaw-dropping backdrops.',
    km: '~85 km of trails',
    best: 'June – October',
    difficulty: 'Moderate – Strenuous'
  },
  {
    id: 'valais',
    name: 'Valais Alps',
    region: 'Valais Canton',
    desc: 'The Matterhorn, Aletsch Glacier, and high-altitude lakes with turquoise reflections. The most iconic Swiss alpine scenery.',
    km: '~120 km of trails',
    best: 'July – September',
    difficulty: 'Strenuous'
  },
  {
    id: 'graubuenden',
    name: 'Graubünden',
    region: 'Graubünden Canton',
    desc: 'Switzerland\'s largest and most diverse canton. Engadin valley lakes, larch forests, and medieval villages provide a quieter, painterly atmosphere.',
    km: '~100 km of trails',
    best: 'June – October',
    difficulty: 'Easy – Strenuous'
  },
  {
    id: 'central',
    name: 'Central Switzerland',
    region: 'Uri / Schwyz / Nidwalden',
    desc: 'Dramatic ridgelines above Lake Lucerne, with accessible peaks and stunning lake panoramas that feel private even in summer.',
    km: '~60 km of trails',
    best: 'May – October',
    difficulty: 'Moderate – Strenuous'
  },
  {
    id: 'ticino',
    name: 'Ticino',
    region: 'Ticino Canton',
    desc: 'The Italian-speaking heart of Switzerland. Sub-Mediterranean light, lakeside villages, olive trees and palm-lined promenades. Magical year-round.',
    km: '~70 km of trails',
    best: 'April – November',
    difficulty: 'Easy – Moderate'
  }
];

const DEFAULT_LOCATIONS = [
  // Bernese Oberland
  { id:'l1', name:'Lauterbrunnen Valley Floor', trail:'bernese', lat:46.5934, lng:7.9082, elev:'795m', season:'Jun–Oct', starred:true, note:'Golden hour floods this valley — shoot facing the waterfalls. Trümmelbach Falls audible from ceremony spots. No car access beyond village.' },
  { id:'l2', name:'Schilthorn Summit (Piz Gloria)', trail:'bernese', lat:46.5584, lng:7.8358, elev:'2970m', season:'Jun–Oct', starred:true, note:'Cable car access. Revolving restaurant makes a wild backdrop. Best in morning before tourist crowds.' },
  { id:'l3', name:'Oeschinen Lake', trail:'bernese', lat:46.5233, lng:7.7330, elev:'1578m', season:'Jun–Sep', starred:false, note:'Gondola + 30min hike. Turquoise water ringed by limestone cliffs. Rowboats available for ceremony on water.' },

  // Valais
  { id:'l4', name:'Riffelsee – Matterhorn Reflection', trail:'valais', lat:45.9835, lng:7.7491, elev:'2757m', season:'Jul–Sep', starred:true, note:'The Matterhorn reflects perfectly in this small alpine lake at sunrise. 45min hike from Rotenboden station. Permit area — check with Zermatt tourist office.' },
  { id:'l5', name:'Aletsch Glacier Viewpoint', trail:'valais', lat:46.4553, lng:8.0711, elev:'2869m', season:'Jul–Sep', starred:true, note:'UNESCO site. Cable car to Jungfraujoch area or hike from Riederalp. Use early morning light from east.' },
  { id:'l6', name:'Saas-Fee Village Edge', trail:'valais', lat:46.1105, lng:7.9291, elev:'1798m', season:'Jun–Oct', starred:false, note:'Car-free village! Easy to scout on foot. Beautiful wooden chalets against the Dom massif.' },

  // Graubünden
  { id:'l7', name:'Sils Lake – Engadin Valley', trail:'graubuenden', lat:46.4266, lng:9.7407, elev:'1798m', season:'Jun–Oct', starred:true, note:'Nietzsche walked here. Wide lake with Julier Pass backdrop. Autumn larch colours in September are extraordinary.' },
  { id:'l8', name:'Pontresina Forest', trail:'graubuenden', lat:46.4922, lng:9.9005, elev:'1805m', season:'Jun–Oct', starred:false, note:'Stone pine and larch forest. Very quiet. A 20-min walk from the train station. Dappled light perfect for editorial portraits.' },
  { id:'l9', name:'Maloja Pass – Bergell Views', trail:'graubuenden', lat:46.4018, lng:9.6942, elev:'1815m', season:'May–Oct', starred:false, note:'Perched at the edge of the Alps. View drops into Italy. Dramatic fog inversion common in autumn mornings.' },

  // Central Switzerland
  { id:'l10', name:'Schäfler Ridge – Appenzell', trail:'central', lat:47.2933, lng:9.4136, elev:'1922m', season:'May–Oct', starred:true, note:'Iconic Swiss ridge walk with wooden chapel. Requires fit couple — steep but not technical. Worth every step.' },
  { id:'l11', name:'Mount Pilatus – Dragon Paths', trail:'central', lat:46.9789, lng:8.2520, elev:'2132m', season:'May–Oct', starred:false, note:'Cog railway or cable car. Dramatic limestone formations. Lake Lucerne views on clear days are stunning.' },

  // Ticino — original locations
  { id:'l12', name:'Verzasca Valley – Green Pools', trail:'ticino', lat:46.2617, lng:8.8462, elev:'490m', season:'Apr–Oct', starred:true, note:'The emerald green water against granite boulders is unlike anywhere else in Switzerland. Ponte dei Salti bridge is iconic.' },
  { id:'l13', name:'Lake Maggiore – Brissago Islands', trail:'ticino', lat:46.1203, lng:8.7282, elev:'196m', season:'Mar–Nov', starred:true, note:'Botanical gardens on small island. Incredibly romantic light in late afternoon. Boat access only — adds to the intimacy.' },
  { id:'l14', name:'Monte San Giorgio Viewpoint', trail:'ticino', lat:45.8924, lng:8.9773, elev:'1097m', season:'Apr–Oct', starred:false, note:'UNESCO mountain. Views over Lake Lugano. Less touristy than Brè. Best in spring with wildflowers.' },

  // Ticino — Monte Brè Trail (NEW)
  { id:'l15', name:'Gandria Pier – Lake Lugano', trail:'ticino', lat:46.0036, lng:9.0218, elev:'276m', season:'Mar–Nov', starred:true, note:'The fishing village of Gandria is a magical ceremony start point. Lakeside light is warm and painterly — best 2hrs before sunset. Arrive by boat from Lugano for a cinematic entrance.' },
  { id:'l16', name:'Village of Brè – Art Furnishings Route', trail:'ticino', lat:46.0199, lng:9.0327, elev:'739m', season:'Mar–Nov', starred:true, note:'Charming hilltop village with open-air artworks dotted through the lanes. Intimate, car-free, and almost unknown to tourists. Perfect for editorial-style couples portraits between stone walls and painted murals.' },
  { id:'l17', name:'Monte Brè Summit – Gulf of Lugano Panorama', trail:'ticino', lat:46.0230, lng:9.0397, elev:'915m', season:'Mar–Nov', starred:true, note:'Sweeping 360° view over Lugano, the lake, and the Alps. Funicular access makes it approachable for any couple. Sunrise light hits directly from the east — arrive early. One of the best alpine elopement payoffs for minimal effort.' },
];

// ──────────────────────────────────────
// STATE
// ──────────────────────────────────────
let locations = JSON.parse(localStorage.getItem('av_locations') || 'null') || DEFAULT_LOCATIONS.map(l=>({...l}));
let activeFilter = 'all';
let mapInstance = null;
let markers = {};
let showAddFormOpen = false;

// ──────────────────────────────────────
// AUTH
// ──────────────────────────────────────
function attemptUnlock() {
  const val = document.getElementById('code-input').value.trim().toLowerCase();
  if (val === ACCESS_CODE) {
    document.getElementById('lock-error').textContent = '';
    document.getElementById('lock-screen').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      initApp();
    }, 600);
  } else {
    document.getElementById('lock-error').textContent = 'Incorrect code. Try again.';
    document.getElementById('code-input').value = '';
  }
}
document.getElementById('code-input').addEventListener('keydown', e => { if (e.key === 'Enter') attemptUnlock(); });

function lockApp() {
  document.getElementById('app').classList.remove('visible');
  document.getElementById('lock-screen').style.opacity = '1';
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('code-input').value = '';
}

// ──────────────────────────────────────
// INIT
// ──────────────────────────────────────
function initApp() {
  initMap();
  renderFilters();
  renderLocationList();
  renderAllLocations();
  renderTrails();
}

function save() {
  localStorage.setItem('av_locations', JSON.stringify(locations));
}

// ──────────────────────────────────────
// MAP
// ──────────────────────────────────────
function initMap() {
  mapInstance = L.map('map', { center: [46.8, 8.2], zoom: 8 });
  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenTopoMap contributors', maxZoom: 17
  }).addTo(mapInstance);
  renderMapMarkers();
}

function makeIcon(starred) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${starred?14:10}px; height:${starred?14:10}px;
      border-radius:50%;
      background:${starred?'#c8a96e':'#4a7c59'};
      border:2px solid #fff;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    "></div>`,
    iconSize: [starred?14:10, starred?14:10],
    iconAnchor: [starred?7:5, starred?7:5],
  });
}

function renderMapMarkers() {
  Object.values(markers).forEach(m => m.remove());
  markers = {};
  const filtered = activeFilter === 'all' ? locations
    : activeFilter === 'starred' ? locations.filter(l => l.starred)
    : locations.filter(l => l.trail === activeFilter);

  filtered.forEach(loc => {
    const m = L.marker([loc.lat, loc.lng], { icon: makeIcon(loc.starred) })
      .addTo(mapInstance)
      .bindPopup(`<div class="popup-name">${loc.name}</div><div class="popup-meta">${loc.elev} · ${loc.season}</div>`);
    m.on('click', () => openDrawer(loc));
    markers[loc.id] = m;
  });
}

function openDrawer(loc) {
  const trail = TRAILS.find(t => t.id === loc.trail);
  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-name">${loc.starred ? '★ ' : ''}${loc.name}</div>
    <div class="drawer-region">${trail ? trail.name : ''}</div>
    <div class="drawer-stats">
      <div class="drawer-stat"><strong>Elevation</strong> ${loc.elev}</div>
      <div class="drawer-stat"><strong>Best Season</strong> ${loc.season}</div>
    </div>
    ${loc.note ? `<div class="drawer-note">${loc.note}</div>` : ''}
  `;
  document.getElementById('detail-drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('detail-drawer').classList.remove('open');
}

// ──────────────────────────────────────
// FILTERS
// ──────────────────────────────────────
function renderFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  const pills = [
    { label: 'All', val: 'all' },
    { label: '★ Starred', val: 'starred', gold: true },
    ...TRAILS.map(t => ({ label: t.name.split(' ')[0], val: t.id }))
  ];
  pills.forEach(p => {
    const el = document.createElement('div');
    el.className = `filter-pill${p.gold ? ' gold' : ''}${activeFilter === p.val ? ' active' : ''}`;
    el.textContent = p.label;
    el.onclick = () => { activeFilter = p.val; renderFilters(); renderLocationList(); renderMapMarkers(); };
    bar.appendChild(el);
  });
}

// ──────────────────────────────────────
// LOCATION LIST (map tab)
// ──────────────────────────────────────
function renderLocationList() {
  const el = document.getElementById('location-list');
  const filtered = activeFilter === 'all' ? locations
    : activeFilter === 'starred' ? locations.filter(l => l.starred)
    : locations.filter(l => l.trail === activeFilter);

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🏔</div>No locations match this filter.</div>`;
    return;
  }

  el.innerHTML = filtered.map(loc => locationCardHTML(loc)).join('');
}

function locationCardHTML(loc) {
  const trail = TRAILS.find(t => t.id === loc.trail);
  return `
    <div class="location-card${loc.starred?' starred':''}" id="card-${loc.id}">
      <div class="card-header">
        <div class="card-name">${loc.name}</div>
        <button class="card-star${loc.starred?' on':''}" onclick="toggleStar('${loc.id}',event)">★</button>
      </div>
      <div class="card-trail-tag">${trail ? trail.name : loc.trail}</div>
      <div class="card-meta">
        <span class="meta-chip"><span class="dot"></span>${loc.elev}</span>
        <span class="meta-chip"><span class="dot"></span>${loc.season}</span>
      </div>
      <div class="card-note">
        <textarea class="card-note-input" placeholder="Add private notes…" onblur="saveNote('${loc.id}',this.value)">${loc.note||''}</textarea>
      </div>
    </div>
  `;
}

function toggleStar(id, e) {
  e.stopPropagation();
  const loc = locations.find(l => l.id === id);
  if (loc) { loc.starred = !loc.starred; save(); renderLocationList(); renderAllLocations(); renderMapMarkers(); renderFilters(); }
}

function saveNote(id, val) {
  const loc = locations.find(l => l.id === id);
  if (loc) { loc.note = val; save(); }
}

function flyTo(loc) {
  if (mapInstance) { mapInstance.flyTo([loc.lat, loc.lng], 14, { duration: 1.5 }); openDrawer(loc); }
}

// ──────────────────────────────────────
// ALL LOCATIONS (locations tab)
// ──────────────────────────────────────
function renderAllLocations() {
  const el = document.getElementById('all-locations-list');
  const count = document.getElementById('loc-count');
  count.textContent = `${locations.length} location${locations.length!==1?'s':''}`;
  el.innerHTML = locations.map(loc => locationCardHTML(loc)).join('');
}

// ──────────────────────────────────────
// TRAILS
// ──────────────────────────────────────
function renderTrails() {
  const el = document.getElementById('trails-list');
  el.innerHTML = TRAILS.map(t => {
    const locs = locations.filter(l => l.trail === t.id);
    const starred = locs.filter(l => l.starred).length;
    return `
      <div class="trail-card" onclick="switchToTrail('${t.id}')">
        <div class="trail-region">${t.region}</div>
        <div class="trail-name">${t.name}</div>
        <div class="trail-desc">${t.desc}</div>
        <div class="trail-stats">
          <div class="trail-stat"><strong>${locs.length}</strong> location${locs.length!==1?'s':''}</div>
          ${starred>0?`<div class="trail-stat" style="color:var(--gold)"><strong>★ ${starred}</strong> starred</div>`:''}
          <div class="trail-stat"><strong>${t.km}</strong></div>
          <div class="trail-stat"><strong>Best:</strong> ${t.best}</div>
        </div>
      </div>
    `;
  }).join('');
}

function switchToTrail(trailId) {
  activeFilter = trailId;
  switchTab('map');
  renderFilters();
  renderLocationList();
  renderMapMarkers();
  const locs = locations.filter(l => l.trail === trailId);
  if (locs.length && mapInstance) {
    setTimeout(() => {
      mapInstance.invalidateSize();
      const bounds = L.latLngBounds(locs.map(l => [l.lat, l.lng]));
      mapInstance.fitBounds(bounds, { padding: [60, 60] });
    }, 80);
  }
}

// ──────────────────────────────────────
// TABS
// ──────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['map','locations','trails'][i] === name);
  });
  document.getElementById('map-panel').classList.toggle('active', name==='map');
  document.getElementById('locations-panel').classList.toggle('active', name==='locations');
  document.getElementById('trails-panel').classList.toggle('active', name==='trails');
  if (name==='map' && mapInstance) setTimeout(()=>mapInstance.invalidateSize(),50);
}

// ──────────────────────────────────────
// ADD FORM
// ──────────────────────────────────────
function showAddForm() {
  switchTab('locations');
  if (showAddFormOpen) return;
  showAddFormOpen = true;
  const container = document.getElementById('add-form-container');
  container.innerHTML = `
    <div class="add-form">
      <div class="form-title">Add New Location</div>
      <div class="form-row">
        <label class="form-label">Name</label>
        <input class="form-input" id="f-name" placeholder="e.g. Grunegg Viewpoint"/>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label class="form-label">Latitude</label>
          <input class="form-input" id="f-lat" placeholder="46.8131"/>
        </div>
        <div class="form-row">
          <label class="form-label">Longitude</label>
          <input class="form-input" id="f-lng" placeholder="8.2234"/>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label class="form-label">Elevation</label>
          <input class="form-input" id="f-elev" placeholder="1200m"/>
        </div>
        <div class="form-row">
          <label class="form-label">Best Season</label>
          <input class="form-input" id="f-season" placeholder="Jun–Sep"/>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Trail / Region</label>
        <select class="form-select" id="f-trail">
          ${TRAILS.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Private Notes</label>
        <textarea class="form-textarea" id="f-note" placeholder="Light, access, permits, shot ideas…"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-sm primary" onclick="submitAddForm()">Save Location</button>
        <button class="btn-sm" onclick="cancelAddForm()">Cancel</button>
      </div>
    </div>
  `;
}

function cancelAddForm() {
  showAddFormOpen = false;
  document.getElementById('add-form-container').innerHTML = '';
}

function submitAddForm() {
  const name = document.getElementById('f-name').value.trim();
  const lat = parseFloat(document.getElementById('f-lat').value);
  const lng = parseFloat(document.getElementById('f-lng').value);
  if (!name || isNaN(lat) || isNaN(lng)) { alert('Please fill in at least a name and coordinates.'); return; }
  const loc = {
    id: 'l' + Date.now(),
    name,
    trail: document.getElementById('f-trail').value,
    lat, lng,
    elev: document.getElementById('f-elev').value || '—',
    season: document.getElementById('f-season').value || '—',
    starred: false,
    note: document.getElementById('f-note').value
  };
  locations.push(loc);
  save();
  cancelAddForm();
  renderLocationList();
  renderAllLocations();
  renderTrails();
  renderMapMarkers();
}
</script>
</body>
</html>
